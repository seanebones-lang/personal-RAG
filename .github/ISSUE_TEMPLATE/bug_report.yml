name: Bug report
description: Something is broken or incorrect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search [existing issues](https://github.com/seanebones-lang/probable-fishstick/issues) first.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. cd probable-fishstick && source .venv/bin/activate
        2. personalragvault ingest ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PersonalRAGVault / Python version
      placeholder: "0.1.0, Python 3.12"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 22.04"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
